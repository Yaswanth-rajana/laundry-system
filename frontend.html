<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laundry Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            color: #667eea;
            font-size: 0.9em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .card .value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
        }

        .form-section, .orders-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .form-section h2, .orders-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .garment-entry {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #764ba2;
        }

        .btn-danger {
            background: #ef4444;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-success {
            background: #10b981;
        }

        .btn-success:hover {
            background: #059669;
        }

        .order-item {
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .order-id {
            font-weight: bold;
            color: #667eea;
            font-size: 1.1em;
        }

        .status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .status-RECEIVED { background: #fef3c7; color: #92400e; }
        .status-PROCESSING { background: #dbeafe; color: #1e40af; }
        .status-READY { background: #d1fae5; color: #065f46; }
        .status-DELIVERED { background: #e0e7ff; color: #3730a3; }

        .garments-list {
            font-size: 0.9em;
            color: #666;
            margin: 10px 0;
        }

        .order-actions {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        select.status-select {
            width: auto;
            padding: 5px;
            font-size: 0.9em;
        }

        .error {
            background: #fee;
            color: #c00;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .success {
            background: #efe;
            color: #0a0;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-container {
            text-align: center;
            padding: 30px;
            display: none;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
            background: #f9f9f9;
            border-radius: 10px;
            border: 2px dashed #e0e0e0;
        }

        .empty-state p {
            margin-top: 10px;
            font-size: 1.1em;
            font-weight: 500;
        }

        .empty-state span {
            font-size: 3em;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧺 Laundry Management System</h1>

        <div class="dashboard" id="dashboard">
            <div class="card">
                <h3>Total Orders</h3>
                <div class="value" id="totalOrders">0</div>
            </div>
            <div class="card">
                <h3>Pending Today</h3>
                <div class="value" id="pendingToday">0</div>
            </div>
            <div class="card">
                <h3>Total Revenue</h3>
                <div class="value" id="totalRevenue">₹0</div>
            </div>
            <div class="card">
                <h3>Avg Order Value</h3>
                <div class="value" id="avgOrderValue">₹0</div>
            </div>
            <div class="card">
                <h3>Most Common</h3>
                <div class="value" id="mostCommon">-</div>
            </div>
        </div>

        <div class="main-grid">
            <div class="form-section">
                <h2>📝 Create New Order</h2>
                <div id="formError" class="error"></div>
                <div id="formSuccess" class="success"></div>
                
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" id="customerName" placeholder="Enter customer name">
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="10 digit mobile number">
                </div>

                <div class="form-group">
                    <label>Garments</label>
                    <div id="garmentsList">
                        <div class="garment-entry">
                            <select class="garment-type">
                                <option value="Shirt">Shirt (₹100)</option>
                                <option value="Pants">Pants (₹120)</option>
                                <option value="Saree">Saree (₹150)</option>
                            </select>
                            <input type="number" class="garment-quantity" placeholder="Qty" value="1" min="1">
                            <button type="button" class="btn btn-danger remove-garment" style="padding: 8px;">Remove</button>
                        </div>
                    </div>
                    <button type="button" class="btn" id="addGarment" style="margin-top: 10px; width: 100%;">+ Add Another Garment</button>
                </div>

                <div class="form-group">
                    <label>Notes (Optional)</label>
                    <input type="text" id="notes" placeholder="Special instructions">
                </div>

                <button class="btn btn-success" id="createOrder" style="width: 100%; margin-top: 10px;">Create Order</button>
            </div>

            <div class="orders-section">
                <h2>📋 Orders</h2>
                <div class="form-group">
                    <input type="text" id="searchBox" placeholder="Search by name or phone...">
                </div>
                <div id="loadingState" class="loading-container">
                    <div class="spinner"></div>
                    <p style="color: #666; margin-top: 10px;">Loading data...</p>
                </div>
                <div id="ordersList"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:8000' : window.location.origin;
        
        async function loadDashboard() {
            try {
                const response = await fetch(`${API_URL}/dashboard`);
                const data = await response.json();
                document.getElementById('totalOrders').textContent = data.total_orders;
                document.getElementById('pendingToday').textContent = data.pending_today;
                document.getElementById('totalRevenue').textContent = `₹${data.total_revenue}`;
                document.getElementById('avgOrderValue').textContent = `₹${data.average_order_value}`;
                document.getElementById('mostCommon').textContent = data.most_common_garment;
            } catch (error) {
                console.error('Error loading dashboard:', error);
                alert("Server error. Please try again.");
            }
        }

        async function loadOrders() {
            try {
                document.getElementById('loadingState').style.display = 'block';
                document.getElementById('ordersList').style.display = 'none';
                
                const search = document.getElementById('searchBox').value;
                let url = `${API_URL}/orders`;
                if (search) {
                    url += `?search=${search}`;
                }
                const response = await fetch(url);
                const data = await response.json();
                
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('ordersList').style.display = 'block';
                displayOrders(data.orders);
            } catch (error) {
                console.error('Error loading orders:', error);
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('ordersList').style.display = 'block';
                alert("Server error. Please try again.");
            }
        }

        function displayOrders(orders) {
            const container = document.getElementById('ordersList');
            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span>📦</span>
                        <p>No orders yet. Create your first order!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = orders.map(order => `
                <div class="order-item">
                    <div class="order-header">
                        <span class="order-id">${order.order_id}</span>
                        <span class="status status-${order.status}">${order.status}</span>
                    </div>
                    <div><strong>${order.customer_name}</strong> | 📞 ${order.phone}</div>
                    <div class="garments-list">
                        ${order.garments.map(g => `${g.quantity}x ${g.type}`).join(', ')}
                    </div>
                    <div><strong>Total: ₹${order.total_amount}</strong></div>
                    <div style="font-size: 0.85em; color: #666;">Est. Delivery: ${order.estimated_delivery_date}</div>
                    <div class="order-actions">
                        <select class="status-select" data-order-id="${order.order_id}" data-current="${order.status}">
                            <option value="RECEIVED" ${order.status === 'RECEIVED' ? 'selected' : ''}>RECEIVED</option>
                            <option value="PROCESSING" ${order.status === 'PROCESSING' ? 'selected' : ''}>PROCESSING</option>
                            <option value="READY" ${order.status === 'READY' ? 'selected' : ''}>READY</option>
                            <option value="DELIVERED" ${order.status === 'DELIVERED' ? 'selected' : ''}>DELIVERED</option>
                        </select>
                        <button class="btn update-status" data-order-id="${order.order_id}" style="padding: 5px 15px;">Update</button>
                    </div>
                </div>
            `).join('');

            // Add event listeners for status updates
            document.querySelectorAll('.update-status').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const orderId = btn.dataset.orderId;
                    const select = btn.parentElement.querySelector('.status-select');
                    const newStatus = select.value;
                    await updateStatus(orderId, newStatus);
                });
            });
        }

        async function updateStatus(orderId, newStatus) {
            try {
                const response = await fetch(`${API_URL}/orders/${orderId}/status`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ status: newStatus })
                });
                
                if (response.ok) {
                    showSuccess('Status updated successfully!');
                    await loadDashboard();
                    await loadOrders();
                } else {
                    const error = await response.json();
                    showError(error.detail || 'Failed to update status');
                }
            } catch (error) {
                showError('Error updating status');
                alert("Server error. Please try again.");
            }
        }

        async function createOrder() {
            const customerName = document.getElementById('customerName').value;
            const phone = document.getElementById('phone').value;
            const notes = document.getElementById('notes').value;
            
            const garmentElements = document.querySelectorAll('.garment-entry');
            const garments = [];
            
            garmentElements.forEach(el => {
                const type = el.querySelector('.garment-type').value;
                const quantity = parseInt(el.querySelector('.garment-quantity').value);
                if (quantity > 0) {
                    garments.push({ type, quantity });
                }
            });
            
            if (!customerName || !phone) {
                showError('Please fill in customer name and phone');
                return;
            }
            
            if (garments.length === 0) {
                showError('Please add at least one garment');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/orders`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        customer_name: customerName,
                        phone: phone,
                        garments: garments,
                        notes: notes
                    })
                });
                
                if (response.ok) {
                    showSuccess('Order created successfully!');
                    // Clear form
                    document.getElementById('customerName').value = '';
                    document.getElementById('phone').value = '';
                    document.getElementById('notes').value = '';
                    // Reset to one garment
                    document.getElementById('garmentsList').innerHTML = `
                        <div class="garment-entry">
                            <select class="garment-type">
                                <option value="Shirt">Shirt (₹100)</option>
                                <option value="Pants">Pants (₹120)</option>
                                <option value="Saree">Saree (₹150)</option>
                            </select>
                            <input type="number" class="garment-quantity" placeholder="Qty" value="1" min="1">
                            <button type="button" class="btn btn-danger remove-garment" style="padding: 8px;">Remove</button>
                        </div>
                    `;
                    attachRemoveEvents();
                    await loadDashboard();
                    await loadOrders();
                } else {
                    const error = await response.json();
                    let errMsg = 'Failed to create order';
                    if (Array.isArray(error.detail)) {
                        // Pydantic validation error format
                        errMsg = error.detail.map(e => e.msg).join(', ');
                    } else if (error.detail) {
                        errMsg = error.detail;
                    } else {
                        errMsg = JSON.stringify(error);
                    }
                    showError(errMsg);
                }
            } catch (error) {
                showError('Error creating order');
                alert("Server error. Please try again.");
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('formError');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('formSuccess');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }

        function attachRemoveEvents() {
            document.querySelectorAll('.remove-garment').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (document.querySelectorAll('.garment-entry').length > 1) {
                        this.parentElement.remove();
                    } else {
                        showError('You need at least one garment');
                    }
                });
            });
        }

        // Event listeners
        document.getElementById('addGarment').addEventListener('click', () => {
            const garmentsList = document.getElementById('garmentsList');
            const newEntry = document.createElement('div');
            newEntry.className = 'garment-entry';
            newEntry.innerHTML = `
                <select class="garment-type">
                    <option value="Shirt">Shirt (₹100)</option>
                    <option value="Pants">Pants (₹120)</option>
                    <option value="Saree">Saree (₹150)</option>
                </select>
                <input type="number" class="garment-quantity" placeholder="Qty" value="1" min="1">
                <button type="button" class="btn btn-danger remove-garment" style="padding: 8px;">Remove</button>
            `;
            garmentsList.appendChild(newEntry);
            attachRemoveEvents();
        });

        document.getElementById('createOrder').addEventListener('click', createOrder);
        document.getElementById('searchBox').addEventListener('input', () => {
            loadOrders();
        });
        
        attachRemoveEvents();
        
        // Initial load
        loadDashboard();
        loadOrders();
        
        // Refresh every 30 seconds
        setInterval(() => {
            loadDashboard();
            loadOrders();
        }, 30000);
    </script>
</body>
</html>
